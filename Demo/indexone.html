<html>
<head>
<style>
/* This CSS code makes the image expand when the link is hovered */
a:hover img {
  transform: scale(1.2);
  transition: transform 0.5s;
}
</style>
</head>
<body>
<!-- This HTML code creates a link to an image that is a link to another site -->
<a href="https://devop0101.github.io/Builds/Mergeball/index.html"> <!-- This is the link to the site you want to redirect to -->
<img src="../images/Mergeball.jpg" alt="Mergeball"> <!-- This is the link to the image you want to display -->
</a>
</body>
</html>
