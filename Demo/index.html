<html>
<head>
<style>
    
    /* This CSS code makes the image expand when the link is hovered */
    a:hover img {
        transform: scale(1.2);
        transition: transform 0.5s;
    }
    
    /* The element to apply the animation to */
    .pulse {
        height: 100vh; /* full viewport height */
        width: 100vw; /* full viewport width */
        background-image: radial-gradient(circle closest-side, rgba(255, 0, 0, 0.75), rgba(0, 0, 255, 0.25)), url("../Images/Hexagon.jpg");
        background-size: cover;
        background-position: center;
        visibility: visible;
        overflow: hidden;
        animation: pulse 2s linear infinite;
        position: relative;
        z-index: 1;
    }

    /* The animation code */
    @keyframes pulse {
        from {
            /*clip-path: circle(50% at 50% 50%); /* start from a centered circle */
            filter: hue-rotate(0deg);
        }
        to {
            /*clip-path: circle(50% at 50% 50%); /* start from a centered circle */
            filter: hue-rotate(360deg);
        }
    }
    
    .container {
        display: table-cell;
        vertical-align: middle;
        text-align: center;
        height: 100vh; /* full viewport height */
        width: 100vw; /* full viewport width */
        background-color: transparent;
        background-size: cover;
        background-position: center;
        animation: counterflash 1s infinite;
        opacity: .4;
        padding-top: 30vh;
        z-index: 2;
    }

    @keyframes counterflash {
        from {
            filter: hue-rotate(0deg);
        }
        to {
            filter: hue-rotate(-360deg);
        }
    }
    
    /* Center the image and set the perspective */
    .face {
        height: 30vh;
        width: 20vw;
        top: -5vh;
        left: 40vw;
        position: absolute;
        margin: auto;
        perspective: 500px;
        z-index: -1;
    }

    /* Rotate the image based on the mouse position */
    .eyes {
        object-fit: cover;
        clip-path: circle(65% at center);
        width: 100%;
        height: 100%;
        transform-style: preserve-3d;
        transition: transform 0.5s;
        opacity: .1;
        z-index: -1;
    }
    
    /* Rotate the image based on the mouse position */
    .jaw {
        object-fit: cover;
        clip-path: circle(55% at center);
        top: 13vh;
        left: 1.75vw;
        position: absolute;
        width: 85%;
        height: 100%;
        transform-style: preserve-3d;
        transition: transform 0.5s;
        opacity: .1;
    }
    
    /* Center the image and set the perspective */
    .lefthand {
        height: 120vh;
        width: 35vw;
        top: 5vh;
        left: 70vw;
        position: absolute;
        margin: auto;
        perspective: 500px;
        z-index: -1;
    }

    /* Rotate the image based on the mouse position */
    .leftpalm {
        object-fit: cover;
        clip-path: circle(65% at center);
        width: 100%;
        height: 100%;
        transform-style: preserve-3d;
        transition: transform 0.5s;
        opacity: .3;
        z-index: -1;
    }
    
    /* Center the image and set the perspective */
    .righthand {
        height: 120vh;
        width: 35vw;
        top: 5vh;
        left: 0vw;
        position: absolute;
        margin: auto;
        perspective: 500px;
        z-index: -1;
    }

    /* Rotate the image based on the mouse position */
    .rightpalm {
        object-fit: cover;
        clip-path: circle(65% at center);
        width: 100%;
        height: 100%;
        transform-style: preserve-3d;
        transition: transform 0.5s;
        opacity: .3;
        z-index: -1;
    }
</style>
</head>
<body>
<div class="pulse">
    <div class="container">
        <!-- This HTML code creates a link to an image that is a link to another site -->
        <a href="https://devop0101.github.io/Builds/Metaball/index.html" target="_blank"> <!-- This is the link to the site you want to redirect to -->
        <img src="../images/Metaball.jpg" title="Metaball" width="350px" height="350px"> <!-- This is the link to the image you want to display -->
        </a>
        <!-- This HTML code creates a link to an image that is a link to another site -->
        <a href="https://devop0101.github.io/Builds/Mergeball/index.html" target="_blank"> <!-- This is the link to the site you want to redirect to -->
        <img src="../images/Mergeball.jpg" title="Mergeball" width="375px" height="375px" padding-top="30vh"> <!-- This is the link to the image you want to display -->
        </a>
        <!-- This HTML code creates a link to an image that is a link to another site -->
        <a href="https://devop0101.github.io/Builds/Cryptoball/index.html" target="_blank"> <!-- This is the link to the site you want to redirect to -->
        <img src="../images/Cryptoball.jpg" title="Cryptoball" width="350px" height="350px"> <!-- This is the link to the image you want to display -->
        </a>
    </div>
    <div class="face">
        <img src="../Images/Eyes.jpg" class="eyes" id="eyes">
        <img src="../Images/Jaw.jpg" class="jaw" id="jaw">
    </div>
    <div class="lefthand">
        <img src="../Images/Lefthand.jpg" class="leftpalm" id="leftpalm">
    </div>
    <div class="righthand">
        <img src="../Images/Righthand.jpg" class="rightpalm" id="rightpalm">
    </div>
</div>

<script>
    // Get the eyes element
    var eyes = document.getElementById("eyes");

    // Add a mousemove event listener to the container
    document.querySelector(".container").addEventListener("mousemove", function(event) {
        // Get the mouse position relative to the container
        var mouseX = event.clientX - this.offsetLeft;
        var mouseY = event.clientY - this.offsetTop;

        // Get the center of the container
        var centerX = this.offsetWidth / 2;
        var centerY = this.offsetHeight / 2;

        // Calculate the rotation angles in degrees
        var rotateX = - (mouseY - centerY) / 8;
        var rotateY = (mouseX - centerX) / 15;

        // Apply the rotation to the eyes
        eyes.style.transform = "rotateX(" + rotateX + "deg) rotateY(" + rotateY + "deg)";
    });
    
    // Get the jaw element
    var jaw = document.getElementById("jaw");

    // Add a mousemove event listener to the container
    document.querySelector(".container").addEventListener("mousemove", function(event) {
        // Get the mouse position relative to the container
        var mouseX = event.clientX - this.offsetLeft;
        var mouseY = event.clientY - this.offsetTop;

        // Get the center of the container
        var centerX = this.offsetWidth / 2;
        var centerY = this.offsetHeight / 2;

        // Calculate the rotation angles in degrees
        var rotateX = - (mouseY - centerY) / 8;
        var rotateY = (mouseX - centerX) / 15;

        // Apply the rotation to the jaw
        jaw.style.transform = "rotateX(" + rotateX + "deg) rotateY(" + rotateY + "deg)";
    });
    
    // Get the leftpalm element
    var leftpalm = document.getElementById("leftpalm");

    // Add a mousemove event listener to the container
    document.querySelector(".container").addEventListener("mousemove", function(event) {
        // Get the mouse position relative to the container
        var mouseX = event.clientX - this.offsetLeft;
        var mouseY = event.clientY - this.offsetTop;

        // Get the center of the container
        var centerX = this.offsetWidth / 2;
        var centerY = this.offsetHeight / 2;

        // Calculate the rotation angles in degrees
        var rotateX = - (mouseY - centerY) / 15;
        var rotateY = (mouseX - centerX) / 20;

        // Apply the rotation to the leftpalm
        leftpalm.style.transform = "rotateX(" + rotateX + "deg) rotateY(" + rotateY + "deg)";
    });
    
    // Get the rightpalm element
    var rightpalm = document.getElementById("rightpalm");

    // Add a mousemove event listener to the container
    document.querySelector(".container").addEventListener("mousemove", function(event) {
        // Get the mouse position relative to the container
        var mouseX = event.clientX - this.offsetLeft;
        var mouseY = event.clientY - this.offsetTop;

        // Get the center of the container
        var centerX = this.offsetWidth / 2;
        var centerY = this.offsetHeight / 2;

        // Calculate the rotation angles in degrees
        var rotateX = - (mouseY - centerY) / 15;
        var rotateY = (mouseX - centerX) / 20;

        // Apply the rotation to the rightpalm
        rightpalm.style.transform = "rotateX(" + rotateX + "deg) rotateY(" + rotateY + "deg)";
    });
</script>
</body>
</html>
